name: Mirror to GitLab

on:
  push:
    branches: ["main"]
    tags: ["v*"]

jobs:
  mirror:
    name: Push to NVIDIA GitLab
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab-master.nvidia.com/it/it-finops-inferwise-ih.git
          git push gitlab main --force
          git push gitlab --tags --force
