name: Sync Benchmarks

on:
  schedule:
    - cron: "0 8 * * 1"  # Weekly on Mondays at 08:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync Arena Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pandas
        run: pip install pandas

      - name: Run benchmark sync
        id: sync
        continue-on-error: true
        run: npx tsx scripts/sync-benchmarks.ts

      - name: Abort on sync failure
        if: steps.sync.outcome == 'failure'
        run: |
          echo "::warning::Benchmark sync failed (Arena API may be unavailable). Skipping PR creation."
          exit 0

      - name: Check for changes
        if: steps.sync.outcome == 'success'
        id: diff
        run: |
          if git diff --quiet packages/pricing-db/benchmarks.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No benchmark changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Benchmark changes detected:"
            git diff --stat packages/pricing-db/benchmarks.json
          fi

      - name: Ensure labels exist
        if: steps.diff.outputs.changed == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'benchmarks', color: '1d76db', description: 'Benchmark data changes' },
              { name: 'automated', color: 'bfdadc', description: 'Automated by CI' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ ...context.repo, name: label.name });
              } catch {
                await github.rest.issues.createLabel({ ...context.repo, ...label });
                console.log(`Created label: ${label.name}`);
              }
            }

      - name: Create PR if benchmarks changed
        if: steps.diff.outputs.changed == 'true'
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(benchmarks): sync Arena quality scores ${{ github.run_started_at }}"
          title: "chore(benchmarks): update Chatbot Arena quality scores"
          body: |
            Automated benchmark data sync from Chatbot Arena.

            This PR was created automatically by the weekly sync workflow.
            Review the score changes and merge to update bundled benchmark data.
          branch: chore/sync-benchmarks
          delete-branch: true
          labels: benchmarks,automated
