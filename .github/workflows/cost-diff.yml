name: Inferwise Cost Diff

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

jobs:
  cost-diff:
    name: LLM Cost Diff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for git diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build pricing-db
        run: pnpm --filter @inferwise/pricing-db build

      - name: Build CLI
        run: pnpm --filter inferwise build

      - name: Run cost diff
        id: cost-diff
        run: |
          OUTPUT=$(node packages/cli/dist/index.js diff \
            --base origin/${{ github.base_ref }} \
            --head ${{ github.sha }} \
            --volume 1000 \
            --format markdown 2>/dev/null) || true
          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        uses: actions/github-script@v7
        env:
          COST_REPORT: ${{ steps.cost-diff.outputs.report }}
        with:
          script: |
            const report = process.env.COST_REPORT || '';
            const marker = '<!-- inferwise-cost-diff -->';
            const body = `${marker}\n${report || 'No cost changes detected.'}`;

            // Find existing comment to update instead of creating a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
