name: Sync Pricing

on:
  schedule:
    - cron: "0 6 * * *"  # Daily at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync Provider Pricing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pricing sync
        run: pnpm --filter @inferwise/scripts sync-pricing

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet packages/pricing-db/providers/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR if pricing changed
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(pricing): sync provider pricing ${{ github.run_started_at }}"
          title: "chore(pricing): update provider pricing data"
          body: |
            Automated pricing data sync.

            This PR was created automatically by the daily sync workflow.
            Review the changes and merge to update bundled pricing data.
          branch: chore/sync-pricing
          delete-branch: true
          labels: pricing,automated
