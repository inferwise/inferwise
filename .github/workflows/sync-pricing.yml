name: Sync Pricing

on:
  schedule:
    - cron: "0 6 * * *"  # Daily at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write
  issues: write

jobs:
  sync:
    name: Sync Provider Pricing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pricing sync (with retry)
        id: sync
        continue-on-error: true
        run: |
          for attempt in 1 2 3; do
            echo "Attempt $attempt of 3..."
            if pnpm --filter @inferwise/scripts sync-pricing; then
              echo "outcome=success" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "::warning::Attempt $attempt failed. Retrying in 30s..."
              sleep 30
            fi
          done
          echo "outcome=failure" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Abort on sync failure
        if: steps.sync.outcome == 'failure'
        run: |
          echo "::warning::Pricing sync failed after 3 attempts (upstream may be unavailable). Skipping."
          exit 0

      - name: Format synced JSON
        if: steps.sync.outcome == 'success'
        run: pnpm biome format --write packages/pricing-db/providers/

      - name: Auto-commit all changes
        if: steps.sync.outcome == 'success'
        run: |
          if git diff --quiet packages/pricing-db/providers/; then
            echo "No changes detected."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add packages/pricing-db/providers/
            git diff --cached --stat
            git commit -m "chore(pricing): sync provider pricing (${{ github.run_started_at }})"
            git push
          fi

      - name: Check for new models
        if: steps.sync.outcome == 'success'
        id: new-models
        run: |
          if [ -f new-models-report.txt ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue for new models
        if: steps.new-models.outputs.found == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('new-models-report.txt', 'utf8').trim();
            const truncated = report.length > 60000 ? report.slice(0, 60000) + '\n\n... (truncated)' : report;

            // Ensure label exists
            try {
              await github.rest.issues.getLabel({ ...context.repo, name: 'new-models' });
            } catch {
              await github.rest.issues.createLabel({
                ...context.repo,
                name: 'new-models',
                color: 'd876e3',
                description: 'New models detected by sync',
              });
            }

            const title = 'New LLM models detected — pricing database update needed';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'new-models',
              per_page: 1,
            });
            const body = '```\n' + truncated + '\n```';
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `Updated discovery report:\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `The daily pricing sync detected new models not yet in our database.\n\n${body}\n\nAdd these models to \`scripts/sync-pricing.ts\` SYNC_CONFIG and the corresponding provider JSON files.`,
                labels: ['new-models', 'pricing'],
              });
            }
