name: Sync Pricing

on:
  schedule:
    - cron: "0 6 * * *"  # Daily at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    name: Sync Provider Pricing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run pricing sync
        id: sync
        continue-on-error: true
        run: npx tsx scripts/sync-pricing.ts

      - name: Abort on sync failure
        if: steps.sync.outcome == 'failure'
        run: |
          echo "::warning::Pricing sync failed (upstream may be unavailable). Skipping PR/issue creation."
          exit 0

      - name: Check for changes
        if: steps.sync.outcome == 'success'
        id: diff
        run: |
          if git diff --quiet packages/pricing-db/providers/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No pricing changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Pricing changes detected:"
            git diff --stat packages/pricing-db/providers/
          fi

      - name: Ensure labels exist
        if: steps.diff.outputs.changed == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'pricing', color: '0e8a16', description: 'Pricing database changes' },
              { name: 'automated', color: 'bfdadc', description: 'Automated by CI' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ ...context.repo, name: label.name });
              } catch {
                await github.rest.issues.createLabel({ ...context.repo, ...label });
                console.log(`Created label: ${label.name}`);
              }
            }

      - name: Create PR if pricing changed
        if: steps.diff.outputs.changed == 'true'
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(pricing): sync provider pricing ${{ github.run_started_at }}"
          title: "chore(pricing): update provider pricing data"
          body: |
            Automated pricing data sync.

            This PR was created automatically by the daily sync workflow.
            Review the changes and merge to update bundled pricing data.
          branch: chore/sync-pricing
          delete-branch: true
          labels: pricing,automated

      - name: Check for new models
        if: steps.sync.outcome == 'success'
        id: new-models
        run: |
          if [ -f new-models-report.txt ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "report<<EOF" >> "$GITHUB_OUTPUT"
            cat new-models-report.txt >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure new-models label exists
        if: steps.new-models.outputs.found == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.getLabel({ ...context.repo, name: 'new-models' });
            } catch {
              await github.rest.issues.createLabel({
                ...context.repo,
                name: 'new-models',
                color: 'd876e3',
                description: 'New models detected by sync',
              });
            }

      - name: Open issue for new models
        if: steps.new-models.outputs.found == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'New LLM models detected — pricing database update needed';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'new-models',
              per_page: 1,
            });
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `Updated discovery report:\n\n\`\`\`\n${{ steps.new-models.outputs.report }}\n\`\`\``,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `The daily pricing sync detected new models not yet in our database.\n\n\`\`\`\n${{ steps.new-models.outputs.report }}\n\`\`\`\n\nAdd these models to \`scripts/sync-pricing.ts\` SYNC_CONFIG and the corresponding provider JSON files.`,
                labels: ['new-models', 'pricing'],
              });
            }
